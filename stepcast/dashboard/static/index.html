<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>stepcast dashboard</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="header">
    <div class="logo">📡 stepcast</div>
    <nav class="nav">
      <a href="#" id="nav-runs" class="nav-link active">Runs</a>
      <a href="#" id="nav-stats" class="nav-link">Stats</a>
    </nav>
  </header>

  <main class="main">
    <!-- Run list view -->
    <section id="view-runs" class="view">
      <div class="toolbar">
        <h1 class="page-title">Pipeline Runs</h1>
        <div class="filters">
          <select id="filter-status" class="select">
            <option value="">All statuses</option>
            <option value="passed">Passed</option>
            <option value="failed">Failed</option>
          </select>
          <button id="btn-refresh" class="btn btn-secondary">↻ Refresh</button>
        </div>
      </div>
      <div id="runs-table-wrap">
        <table class="table" id="runs-table">
          <thead>
            <tr>
              <th>Pipeline</th>
              <th>Status</th>
              <th>Duration</th>
              <th>Timestamp</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="runs-body">
            <tr><td colspan="5" class="empty">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- Stats view -->
    <section id="view-stats" class="view hidden">
      <h1 class="page-title">Statistics</h1>
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><div class="stat-val" id="stat-total">—</div><div class="stat-lbl">Total Runs</div></div>
        <div class="stat-card passed"><div class="stat-val" id="stat-passed">—</div><div class="stat-lbl">Passed</div></div>
        <div class="stat-card failed"><div class="stat-val" id="stat-failed">—</div><div class="stat-lbl">Failed</div></div>
        <div class="stat-card"><div class="stat-val" id="stat-avg">—</div><div class="stat-lbl">Avg Duration</div></div>
      </div>
    </section>

    <!-- Run detail modal -->
    <div id="detail-overlay" class="overlay hidden">
      <div class="detail-panel">
        <button id="detail-close" class="btn-close">✕</button>
        <h2 id="detail-name" class="detail-title"></h2>
        <div id="detail-meta" class="detail-meta"></div>
        <div id="detail-steps" class="steps-list"></div>
      </div>
    </div>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
